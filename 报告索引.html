<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>报告导航 | 老潘投研</title>
<style>
:root { --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#e6edf3; --sub:#8b949e; --accent:#58a6ff; --gold:#f0a040; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,"Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); padding:24px; max-width:1100px; margin:0 auto; }
h1 { font-size:24px; margin-bottom:4px; }
.subtitle { color:var(--sub); font-size:13px; margin-bottom:8px; }
.loading { color:var(--accent); font-size:14px; padding: 40px 0; text-align:center; display:none; }
.error { color:#f85149; font-size:14px; padding:40px 0; text-align:center; display:none; }
.section-label { font-size:13px; color:var(--accent); margin:18px 0 6px; padding-left:8px; border-left:3px solid var(--accent); font-weight:600; }
.date-title { font-size:14px; color:var(--gold); margin:14px 0 8px; padding-bottom:5px; border-bottom:1px solid var(--border); }
.report-list { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:6px; }
.report-item { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:10px 12px; display:flex; align-items:center; justify-content:space-between; transition:border-color 0.2s; }
.report-item:hover { border-color:var(--accent); }
.report-name { font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:75%; }
.report-link { color:var(--accent); font-size:12px; text-decoration:none; font-weight:600; white-space:nowrap; padding:2px 6px; }
.report-link:hover { text-decoration:underline; }
.footer { margin-top:24px; padding-top:12px; border-top:1px solid var(--border); font-size:11px; color:var(--sub); text-align:center; }
.stats-row { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:4px; }
.stat-chip { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:4px 14px; font-size:12px; color:var(--sub); }
.stat-chip strong { color:var(--accent); }
.refresh-hint { color:var(--sub); font-size:11px; cursor:pointer; user-select:none; text-align:right; }
.refresh-hint:hover { color:var(--accent); }
@media(max-width:600px){ .report-list{ grid-template-columns:1fr } }
</style>
</head>
<body>
<h1>老潘投研 · 报告导航</h1>
<div class="subtitle" id="subtitle">加载中…</div>

<div class="loading" id="loading">🔄 正在从 GitHub 拉取最新文件列表…</div>
<div class="error" id="error" onclick="this.style.display='none';loadIndex();" style="cursor:pointer"></div>

<div id="content"></div>

<div class="footer">
  © 2026 老潘投研 · 索引自动生成 · GitHub API 实时同步<br>
  <span class="refresh-hint" onclick="loadIndex()">🔄 点击刷新</span>
</div>

<script>
const API = 'https://api.github.com/repos/LaoPan2026/laopan-reports/git/trees/main?recursive=1';

async function loadIndex() {
  const loading = document.getElementById('loading');
  const error = document.getElementById('error');
  const subtitle = document.getElementById('subtitle');
  const content = document.getElementById('content');

  loading.style.display = 'block';
  error.style.display = 'none';
  content.innerHTML = '';

  try {
    const resp = await fetch(API, { headers: { Accept: 'application/vnd.github+json' } });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const data = await resp.json();
    const files = data.tree.filter(t => t.type === 'blob');

    if (files.length === 0) throw new Error('空文件列表');

    // Categorize
    const briefing = [], review = [], weekly = [], reports = {};

    files.forEach(f => {
      const p = f.path;
      if (p.startsWith('daily-briefing/') && p.endsWith('.html')) {
        briefing.push(p.replace('daily-briefing/',''));
      } else if (p.startsWith('daily-review/') && p.endsWith('.html')) {
        review.push(p.replace('daily-review/',''));
      } else if (p.startsWith('weekly-review/') && p.endsWith('.html')) {
        weekly.push(p.replace('weekly-review/',''));
      } else if (p.startsWith('reports/')) {
        const parts = p.split('/');
        if (parts.length === 3) {
          const date = parts[1], name = parts[2];
          if (name.endsWith('.html') || name.endsWith('.pptx')) {
            if (!reports[date]) reports[date] = [];
            reports[date].push(name);
          }
        }
      }
    });

    // Sort
    briefing.sort((a,b) => b.localeCompare(a));
    review.sort((a,b) => b.localeCompare(a));
    weekly.sort((a,b) => b.localeCompare(a));

    const total = briefing.length + review.length + weekly.length +
      Object.values(reports).reduce((s,arr) => s + arr.length, 0);

    subtitle.innerHTML = `数据专题 · 景气成长投资研究体系 | 共 <strong style="color:var(--accent)">${total}</strong> 份报告 · 实时同步`;

    let html = '';

    function makeName(f) {
      return f.replace('.html','').replace('.pptx',' (PPT)').replace(/_/g,' ').replace(/2026-/g,'');
    }

    function makeLink(path) {
      return `<a class="report-link" href="${encodeURI(path)}" target="_blank">查看</a>`;
    }

    if (briefing.length) {
      html += '<div class="section-label">每日盘前简报</div><div class="report-list">';
      briefing.forEach(f => {
        html += `<div class="report-item"><span class="report-name">${makeName(f)}</span>${makeLink('daily-briefing/'+f)}</div>`;
      });
      html += '</div>';
    }

    if (review.length) {
      html += '<div class="section-label">每日盘后复盘</div><div class="report-list">';
      review.forEach(f => {
        html += `<div class="report-item"><span class="report-name">${makeName(f)}</span>${makeLink('daily-review/'+f)}</div>`;
      });
      html += '</div>';
    }

    if (weekly.length) {
      html += '<div class="section-label">每周复盘</div><div class="report-list">';
      weekly.forEach(f => {
        html += `<div class="report-item"><span class="report-name">${makeName(f)}</span>${makeLink('weekly-review/'+f)}</div>`;
      });
      html += '</div>';
    }

    const sortedDates = Object.keys(reports).sort((a,b) => b.localeCompare(a));
    sortedDates.forEach(date => {
       html += `<div class="date-title">📅 ${date} 专题研报 <span style="color:var(--sub);font-size:11px;font-weight:400">(${reports[date].length}份)</span></div><div class="report-list">`;
       reports[date].sort((a,b) => b.localeCompare(a)).forEach(f => {
         html += `<div class="report-item"><span class="report-name">${makeName(f)}</span>${makeLink('reports/'+date+'/'+f)}</div>`;
       });
       html += '</div>';
    });

    content.innerHTML = html;
    loading.style.display = 'none';

  } catch(e) {
    loading.style.display = 'none';
    error.style.display = 'block';
    error.textContent = '⚠️ 加载失败（' + e.message + '）。点击此处重试，或稍后刷新页面。';
  }
}

loadIndex();
</script>
</body>
</html>
